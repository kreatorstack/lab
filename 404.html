<!DOCTYPE html>
<html lang="pt-BR">

<head>
     <meta charset="UTF-8" />
     <script>
          const path = window.location.pathname;
          const repo = '/lab';
          const hash = path.replace(repo, '') || '/';
          window.location.replace(
               window.location.origin + repo + '/#' + hash
          );
     </script>
</head>

</html>
